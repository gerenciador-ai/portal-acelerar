name: Nibo Daily Sync
on:
  schedule:
    - cron: '0 11 * * *' # Todo dia às 08:00 (Brasília)
  workflow_dispatch: # Botão "Run workflow"
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: {node-version: '18'}
      - name: Install Dependencies
        run: npm install axios
      - name: Run Nibo Sync Script
        run: |
          mkdir -p data
          node scripts/nibo_sync.js
      - name: Commit and Push Changes
        run: |
          git config user.name "Acelerar Bot"
          git config user.email "bot@acelerar.tech"
          git add data/
          git commit -m "auto: Atualização Multi-Empresa Nibo" || echo "Nenhuma mudança detectada"
          git push
