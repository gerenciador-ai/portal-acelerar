name: Nibo Daily Sync
on:
  schedule:
    - cron: '0 11 * * *' # Todo dia às 08:00 (Brasília)
  workflow_dispatch: # Permite o botão de "Forçar Atualização"
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: {node-version: '18'}
      - run: npm install axios
      - run: node scripts/nibo_sync.js
      - run: |
          git config user.name "Acelerar Bot"
          git config user.email "bot@acelerar.tech"
          git add data/inadimplencia.json
          git commit -m "auto: Atualização Nibo" || exit 0
          git push
